name: Dock Shield CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kirtan-lokadiya/dock-shield-devsecops/dock-shield-api
  FRONTEND_IMAGE: ghcr.io/kirtan-lokadiya/dock-shield-devsecops/dock-shield-ui

jobs:

  # ── Security Scan on Backend Code ──
  security-scan:
    name: "🔍 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks (Secret Detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep (SAST)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan --config p/nodejs --config p/owasp-top-ten --error

  # ── Build & Push Backend ──
  build-backend:
    name: "🐳 Build Backend"
    needs: [security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Push Backend Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:latest

  # ── Build & Push Frontend ──
  build-frontend:
    name: "🌐 Build Frontend"
    needs: [security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Frontend Image
        run: docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

      - name: Push Frontend Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker tag ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ── Provision/Reuse DigitalOcean Infra ──
  infra:
    name: "🏗️ Provision Infra"
    needs: [security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      kubeconfig_b64: ${{ steps.kubeconfig.outputs.kubeconfig_b64 }}
    env:
      CLUSTER_NAME: dock-shield-cluster
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # Without remote Terraform state in CI, we guard cluster creation explicitly.
      - name: Check whether DOKS cluster already exists
        id: cluster-check
        run: |
          if doctl kubernetes cluster get "$CLUSTER_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Cluster already exists: $CLUSTER_NAME"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Cluster not found. Terraform will create it."
          fi

      - name: Terraform Init
        if: steps.cluster-check.outputs.exists == 'false'
        run: terraform -chdir=terraform init

      - name: Terraform Apply (first-time cluster create)
        if: steps.cluster-check.outputs.exists == 'false'
        run: terraform -chdir=terraform apply -auto-approve

      - name: Export kubeconfig from DigitalOcean
        id: kubeconfig
        run: |
          doctl kubernetes cluster kubeconfig show "$CLUSTER_NAME" > kubeconfig
          echo "kubeconfig_b64=$(base64 -w 0 kubeconfig)" >> "$GITHUB_OUTPUT"

  # ── Deploy to Kubernetes ──
  deploy:
    name: "🚀 Deploy to K8s"
    needs: [build-backend, build-frontend, infra]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ needs.infra.outputs.kubeconfig_b64 }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Deploy
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/*.yaml
          kubectl apply -f k8s/
